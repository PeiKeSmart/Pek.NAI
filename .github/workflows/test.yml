name: test

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

jobs:
  build-publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        cache-dependency-path: Web/pnpm-lock.yaml

    - name: Setup dotNET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Install frontend dependencies
      run: pnpm --dir Web install --frozen-lockfile

    - name: Build frontend
      run: pnpm --dir Web build

    - name: Test frontend
      shell: bash
      run: |
        if node -e "const scripts=require('./Web/package.json').scripts||{}; process.exit(scripts.test ? 0 : 1)"; then
          pnpm --dir Web test
        else
          echo "No frontend unit test script found in Web/package.json, skipping frontend tests."
        fi

    - name: Build backend
      run: dotnet build -c Release Pek.NAI.slnx

    - name: Test backend
      run: dotnet test -c Release --no-build Pek.NAI.slnx
